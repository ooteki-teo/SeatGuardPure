<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatGuard - 智能久坐提醒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
        }

        /* 左侧导航 */
        .sidebar {
            width: 240px;
            background: #ffffff;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.05);
            padding: 30px 0;
            display: flex;
            flex-direction: column;
        }

        .logo {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid #e8ecf0;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 1.5em;
            color: #2d3436;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 1.8em;
        }

        .nav-list {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: #636e72;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: #f8f9fa;
            color: #2d3436;
        }

        .nav-item.active {
            background: #e8f5e9;
            color: #27ae60;
            border-left-color: #27ae60;
        }

        .nav-icon {
            font-size: 1.2em;
            margin-right: 12px;
            width: 24px;
            text-align: center;
        }

        /* 右侧内容区 */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 状态卡片 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .status-card:hover {
            transform: translateY(-2px);
        }

        .status-card-icon {
            font-size: 2em;
            margin-bottom: 12px;
        }

        .status-card-value {
            font-size: 2em;
            font-weight: 700;
            color: #2d3436;
        }

        .status-card-label {
            color: #636e72;
            font-size: 0.9em;
            margin-top: 4px;
        }

        .status-card.work { border-left: 4px solid #27ae60; }
        .status-card.relax { border-left: 4px solid #f39c12; }
        .status-card.away { border-left: 4px solid #95a5a6; }
        .status-card.check { border-left: 4px solid #3498db; }

        /* 快速操作 */
        .quick-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            text-decoration: none;
            color: #2d3436;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #f8f9fa;
            border-color: #27ae60;
            color: #27ae60;
        }

        .action-btn.primary {
            background: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        .action-btn.primary:hover {
            background: #219a52;
        }

        /* 标题 */
        .page-title {
            font-size: 1.8em;
            color: #2d3436;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title-icon {
            font-size: 1.2em;
        }

        /* 表单 */
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .form-row input,
        .form-row select {
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            flex: 1;
            min-width: 150px;
        }

        .form-row input:focus,
        .form-row select:focus {
            outline: none;
            border-color: #27ae60;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:hover {
            background: #219a52;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* 任务列表 */
        .task-list {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #f8f9fa;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-size: 1.1em;
            font-weight: 500;
            color: #2d3436;
        }

        .task-meta {
            font-size: 0.85em;
            color: #636e72;
            margin-top: 4px;
        }

        .task-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-right: 20px;
        }

        .progress-bar {
            width: 100px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #27ae60;
            transition: width 0.3s;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
        }

        .status-未开始 { background: #f0f0f0; color: #636e72; }
        .status-进行中 { background: #e3f2fd; color: #1976d2; }
        .status-已完成 { background: #e8f5e9; color: #388e3c; }

        /* 设置项 */
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            font-weight: 500;
            color: #2d3436;
        }

        .setting-desc {
            font-size: 0.85em;
            color: #636e72;
            margin-top: 2px;
        }

        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: #27ae60;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle.active::after {
            transform: translateX(22px);
        }

        /* 日志 */
        .log-container {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 16px;
            height: 500px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        .log-entry {
            padding: 4px 0;
            color: #d4d4d4;
            border-bottom: 1px solid #2a2a2a;
        }

        .log-entry:hover {
            background: #2a2d2e;
        }

        .timestamp {
            color: #858585;
            margin-right: 8px;
        }

        .level-info { color: #4fc1ff; }
        .level-warning { color: #cca700; }
        .level-error { color: #f14c4c; }

        /* 报告 */
        .report-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        /* 报告卡片样式 */
        .report-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e8ecf0;
        }

        .report-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #27ae60;
        }

        .report-icon {
            font-size: 2em;
        }

        .report-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #2d3436;
        }

        .report-date {
            color: #636e72;
            font-size: 0.9em;
        }

        .report-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .report-stat {
            text-align: center;
            padding: 16px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .report-stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #27ae60;
        }

        .report-stat-label {
            font-size: 0.85em;
            color: #636e72;
            margin-top: 4px;
        }

        .report-section-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8ecf0;
        }

        /* 任务进度条 */
        .task-progress-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .task-progress-item:last-child {
            border-bottom: none;
        }

        .task-name {
            flex: 1;
            font-weight: 500;
            color: #2d3436;
        }

        .task-category {
            font-size: 0.8em;
            color: #636e72;
            margin-left: 8px;
        }

        .task-bar-container {
            width: 150px;
            margin: 0 12px;
        }

        .task-bar {
            height: 8px;
            background: #e8ecf0;
            border-radius: 4px;
            overflow: hidden;
        }

        .task-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .task-blocks {
            font-size: 0.9em;
            color: #636e72;
            min-width: 50px;
            text-align: right;
        }

        /* 每日进度 */
        .daily-progress {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .daily-item {
            flex: 1;
            min-width: 80px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .daily-weekday {
            font-size: 0.85em;
            color: #636e72;
        }

        .daily-blocks {
            font-size: 1.4em;
            font-weight: 600;
            color: #27ae60;
        }

        .daily-label {
            font-size: 0.75em;
            color: #95a5a6;
        }

        .level-high { color: #27ae60; }
        .level-medium { color: #f39c12; }
        .level-low { color: #95a5a6; }

        /* 分类统计 */
        .category-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
        }

        .category-name {
            width: 80px;
            font-weight: 500;
        }

        .category-bar {
            flex: 1;
            height: 20px;
            background: #e8ecf0;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 12px;
        }

        .category-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            border-radius: 10px;
        }

        .category-value {
            min-width: 60px;
            text-align: right;
            font-weight: 500;
        }

        /* 健康数据 */
        .health-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .health-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 20px;
        }

        .health-icon {
            font-size: 1.2em;
        }

        .health-value {
            font-weight: 600;
            color: #2d3436;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #636e72;
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 16px;
        }

        /* 输入数字框 */
        input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        .unit {
            color: #636e72;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <!-- 左侧导航 -->
    <div class="sidebar">
        <div class="logo">
            <h1><span class="logo-icon">🪑</span> SeatGuard</h1>
        </div>
        <div class="nav-list">
            <a class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>首页
            </a>
            <a class="nav-item" data-page="tasks">
                <span class="nav-icon">📋</span>任务板
            </a>
            <a class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>设置
            </a>
            <a class="nav-item" data-page="logs">
                <span class="nav-icon">📝</span>日志
            </a>
            <a class="nav-item" data-page="reports">
                <span class="nav-icon">📊</span>报告
            </a>
        </div>
    </div>

    <!-- 右侧内容 -->
    <div class="main-content">
        <!-- 首页 -->
        <div class="page active" id="page-home">
            <h2 class="page-title"><span class="page-title-icon">🏠</span>概览</h2>

            <div class="status-grid" id="statusGrid">
                <div class="status-card work">
                    <div class="status-card-icon">💪</div>
                    <div class="status-card-value" id="totalBlocks">0</div>
                    <div class="status-card-label">总专注块</div>
                </div>
                <div class="status-card">
                    <div class="status-card-icon">✅</div>
                    <div class="status-card-value" id="completedBlocks">0</div>
                    <div class="status-card-label">已完成块</div>
                </div>
                <div class="status-card">
                    <div class="status-card-icon">📋</div>
                    <div class="status-card-value" id="totalTasks">0</div>
                    <div class="status-card-label">总任务</div>
                </div>
                <div class="status-card">
                    <div class="status-card-icon">🎯</div>
                    <div class="status-card-value" id="completedTasks">0</div>
                    <div class="status-card-label">已完成任务</div>
                </div>
            </div>

            <h3 style="margin-bottom: 16px; color: #2d3436;">快速操作</h3>
            <div class="quick-actions">
                <a class="action-btn primary" href="#" onclick="navigateTo('tasks')">
                    <span>➕</span> 添加任务
                </a>
                <a class="action-btn" href="#" onclick="navigateTo('tasks')">
                    <span>📋</span> 查看任务
                </a>
                <a class="action-btn" href="#" onclick="navigateTo('reports')">
                    <span>📊</span> 查看报告
                </a>
                <a class="action-btn" href="#" onclick="navigateTo('settings')">
                    <span>⚙️</span> 系统设置
                </a>
            </div>

            <h3 style="margin-bottom: 16px; color: #2d3436;">今日任务</h3>
            <div class="task-list" id="homeTaskList">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <div>暂无任务</div>
                </div>
            </div>
        </div>

        <!-- 任务板 -->
        <div class="page" id="page-tasks">
            <h2 class="page-title"><span class="page-title-icon">📋</span>任务板</h2>

            <div class="form-card">
                <div class="form-row">
                    <input type="text" id="taskName" placeholder="输入任务名称..." />
                    <select id="taskCategory">
                        <option value="工作">工作</option>
                        <option value="学习">学习</option>
                        <option value="会议">会议</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="number" id="taskBlocks" placeholder="块数" min="1" max="20" value="1" />
                    <button class="btn btn-primary" onclick="addTask()">添加任务</button>
                </div>
            </div>

            <div class="task-list" id="taskList">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <div>暂无任务</div>
                </div>
            </div>
        </div>

        <!-- 设置 -->
        <div class="page" id="page-settings">
            <h2 class="page-title"><span class="page-title-icon">⚙️</span>设置</h2>

            <div class="form-card">
                <h3 style="margin-bottom: 16px; color: #2d3436;">提醒设置</h3>

                <div class="setting-item">
                    <div>
                        <div class="setting-label">久坐提醒时长</div>
                        <div class="setting-desc">超过此时间未活动将发送提醒</div>
                    </div>
                    <div>
                        <input type="number" id="reminderDuration" min="10" max="120" />
                        <span class="unit">分钟</span>
                    </div>
                </div>

                <div class="setting-item">
                    <div>
                        <div class="setting-label">休息倒计时</div>
                        <div class="setting-desc">久坐超时后进入休息模式的倒计时</div>
                    </div>
                    <div>
                        <input type="number" id="restCountdown" min="30" max="600" />
                        <span class="unit">秒</span>
                    </div>
                </div>

                <div class="setting-item">
                    <div>
                        <div class="setting-label">截图功能</div>
                        <div class="setting-desc">工作开始/结束时自动截图</div>
                    </div>
                    <div class="toggle" id="screenshotToggle" onclick="toggleScreenshot()"></div>
                </div>

                <div style="margin-top: 20px;">
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                </div>
            </div>

            <div class="form-card">
                <h3 style="margin-bottom: 16px; color: #2d3436;">关于</h3>
                <div class="setting-item">
                    <div>
                        <div class="setting-label">版本</div>
                        <div class="setting-desc">SeatGuard v1.0.0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div class="page" id="page-logs">
            <h2 class="page-title"><span class="page-title-icon">📝</span>日志</h2>

            <div style="margin-bottom: 16px;">
                <button class="btn btn-primary" onclick="refreshLogs()">🔄 刷新</button>
            </div>

            <div class="log-container" id="logContainer">
                <div class="log-entry">加载中...</div>
            </div>
        </div>

        <!-- 报告 -->
        <div class="page" id="page-reports">
            <h2 class="page-title"><span class="page-title-icon">📊</span>报告</h2>

            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="loadReport('daily')">📊 今日日报</button>
                <button class="btn btn-primary" onclick="loadReport('weekly')" style="margin-left: 8px;">📈 本周周报</button>
            </div>

            <div class="report-content" id="reportContent">
                <div class="empty-state">
                    <div class="empty-icon">📊</div>
                    <div>点击上方按钮查看报告</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                navigateTo(page);
            });
        });

        function navigateTo(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');

            // 页面加载时刷新数据
            if (page === 'home') loadHomeData();
            if (page === 'tasks') loadTasks();
            if (page === 'settings') loadConfig();
            if (page === 'logs') refreshLogs();
        }

        // 首页数据
        async function loadHomeData() {
            try {
                const res = await fetch('/api/tasks/summary');
                const data = await res.json();
                document.getElementById('totalBlocks').textContent = data.total_blocks || 0;
                document.getElementById('completedBlocks').textContent = data.completed_blocks || 0;
                document.getElementById('totalTasks').textContent = data.total || 0;
                document.getElementById('completedTasks').textContent = data.completed || 0;
            } catch (e) {}
            loadHomeTasks();
        }

        async function loadHomeTasks() {
            try {
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                const container = document.getElementById('homeTaskList');

                if (tasks.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div>暂无任务</div></div>';
                    return;
                }

                container.innerHTML = tasks.slice(0, 5).map(task => {
                    const progress = (task.completed_blocks || 0) / task.estimated_blocks * 100;
                    return `
                        <div class="task-item">
                            <div class="task-info">
                                <div class="task-name">${task.name}</div>
                                <div class="task-meta">
                                    <span class="status-badge status-${task.status}">${task.status}</span>
                                </div>
                            </div>
                            <div class="task-progress">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                                <span>${task.completed_blocks || 0}/${task.estimated_blocks}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {}
        }

        // 任务
        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                const container = document.getElementById('taskList');

                if (tasks.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div>暂无任务</div></div>';
                    return;
                }

                container.innerHTML = tasks.map(task => {
                    const progress = (task.completed_blocks || 0) / task.estimated_blocks * 100;
                    return `
                        <div class="task-item">
                            <div class="task-info">
                                <div class="task-name">${task.name}</div>
                                <div class="task-meta">
                                    <span class="status-badge status-${task.status}">${task.status}</span>
                                    <span>${task.category}</span>
                                </div>
                            </div>
                            <div class="task-progress">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                                <span>${task.completed_blocks || 0}/${task.estimated_blocks}</span>
                            </div>
                            <div class="task-actions">
                                ${task.status !== '已完成' ? `
                                    <button class="btn btn-primary btn-sm" onclick="startTask('${task.id}')">开始</button>
                                    <button class="btn btn-primary btn-sm" onclick="completeBlock('${task.id}')">+1块</button>
                                ` : ''}
                                <button class="btn btn-danger btn-sm" onclick="deleteTask('${task.id}')">删除</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function addTask() {
            const name = document.getElementById('taskName').value.trim();
            const category = document.getElementById('taskCategory').value;
            const blocks = parseInt(document.getElementById('taskBlocks').value) || 1;

            if (!name) {
                alert('请输入任务名称');
                return;
            }

            try {
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, category, estimated_blocks: blocks })
                });
                document.getElementById('taskName').value = '';
                loadTasks();
            } catch (e) {
                alert('添加失败');
            }
        }

        async function startTask(taskId) {
            await fetch(`/api/tasks/${taskId}/start`, { method: 'POST' });
            loadTasks();
        }

        async function completeBlock(taskId) {
            await fetch(`/api/tasks/${taskId}/complete`, { method: 'POST' });
            loadTasks();
        }

        async function deleteTask(taskId) {
            if (!confirm('确定删除?')) return;
            await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
            loadTasks();
        }

        // 设置
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                document.getElementById('reminderDuration').value = data.reminder_duration;
                document.getElementById('restCountdown').value = data.rest_countdown;
                const toggle = document.getElementById('screenshotToggle');
                toggle.classList.toggle('active', data.screenshot_enabled);
            } catch (e) {}
        }

        function toggleScreenshot() {
            document.getElementById('screenshotToggle').classList.toggle('active');
        }

        async function saveSettings() {
            const reminder = parseInt(document.getElementById('reminderDuration').value);
            const rest = parseInt(document.getElementById('restCountdown').value);
            const screenshot = document.getElementById('screenshotToggle').classList.contains('active');

            await fetch('/api/config', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    reminder_duration: reminder,
                    rest_countdown: rest,
                    screenshot_enabled: screenshot
                })
            });
            alert('设置已保存');
        }

        // 日志
        async function refreshLogs() {
            try {
                const res = await fetch('/api/logs?lines=200');
                const data = await res.json();
                const logs = data.logs || [];

                const container = document.getElementById('logContainer');
                if (logs.length === 0) {
                    container.innerHTML = '<div class="log-entry">暂无日志</div>';
                    return;
                }

                container.innerHTML = logs.map(line => {
                    const match = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}).*?(\w+).*?(.+)$/);
                    if (match) {
                        const level = match[2].toUpperCase();
                        let levelClass = 'level-info';
                        if (level === 'ERROR') levelClass = 'level-error';
                        else if (level === 'WARNING') levelClass = 'level-warning';
                        return `<div class="log-entry"><span class="timestamp">${match[1]}</span><span class="${levelClass}">[${level}]</span> ${match[3]}</div>`;
                    }
                    return `<div class="log-entry">${line}</div>`;
                }).join('');

                container.scrollTop = container.scrollHeight;
            } catch (e) {}
        }

        // 报告
        async function loadReport(type) {
            const endpoint = type === 'daily' ? '/api/reports/daily' : '/api/reports/weekly';
            const container = document.getElementById('reportContent');

            try {
                const data = await fetch(endpoint).then(r => r.json());

                if (!data.hasData) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📊</div>
                            <div>${data.message || '暂无数据'}</div>
                        </div>
                    `;
                    return;
                }

                if (data.type === 'daily') {
                    container.innerHTML = renderDailyReport(data);
                } else {
                    container.innerHTML = renderWeeklyReport(data);
                }
            } catch (e) {
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 渲染日报
        function renderDailyReport(data) {
            const s = data.summary;
            const tasks = data.tasks || [];
            const health = data.health;

            let tasksHtml = tasks.map(task => {
                const statusClass = task.status === '已完成' ? 'status-done' : 'status-pending';
                return `
                    <div class="task-progress-item">
                        <div class="task-name">
                            ${task.name}
                            <span class="task-category">${task.category}</span>
                        </div>
                        <div class="task-bar-container">
                            <div class="task-bar">
                                <div class="task-bar-fill" style="width: ${task.progress}%"></div>
                            </div>
                        </div>
                        <div class="task-blocks">${task.completed}/${task.total}块</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="report-card">
                    <div class="report-header">
                        <span class="report-icon">📊</span>
                        <div>
                            <div class="report-title">今日工作日报</div>
                            <div class="report-date">${data.date}</div>
                        </div>
                    </div>
                    <div class="report-stats-grid">
                        <div class="report-stat">
                            <div class="report-stat-value">${s.totalHours}h</div>
                            <div class="report-stat-label">总工作时间</div>
                        </div>
                        <div class="report-stat">
                            <div class="report-stat-value">${s.completedBlocks}</div>
                            <div class="report-stat-label">完成块数</div>
                        </div>
                        <div class="report-stat">
                            <div class="report-stat-value">${s.completionRate}%</div>
                            <div class="report-stat-label">完成率</div>
                        </div>
                        <div class="report-stat">
                            <div class="report-stat-value">${s.totalBlocks}</div>
                            <div class="report-stat-label">总块数</div>
                        </div>
                    </div>
                </div>

                <div class="report-card">
                    <div class="report-section-title">📋 任务完成情况</div>
                    ${tasksHtml || '<div style="color:#636e72;">暂无任务</div>'}
                </div>

                <div class="report-card">
                    <div class="report-section-title">💪 健康数据</div>
                    <div class="health-stats">
                        <div class="health-item">
                            <span class="health-icon">☕</span>
                            <span>休息</span>
                            <span class="health-value">${health.breaks}次</span>
                        </div>
                        <div class="health-item">
                            <span class="health-icon">🚶</span>
                            <span>离开</span>
                            <span class="health-value">${health.leaves}次</span>
                        </div>
                        <div class="health-item">
                            <span class="health-icon">⏰</span>
                            <span>离开时长</span>
                            <span class="health-value">${health.leaveMinutes}分钟</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染周报
        function renderWeeklyReport(data) {
            const s = data.summary;
            const daily = data.dailyData || [];
            const categories = data.categoryStats || [];

            let dailyHtml = daily.map(day => {
                return `
                    <div class="daily-item">
                        <div class="daily-weekday">${day.weekday}</div>
                        <div class="daily-blocks level-${day.level}">${day.blocks}</div>
                        <div class="daily-label">块</div>
                    </div>
                `;
            }).join('');

            let categoryHtml = categories.map(cat => {
                return `
                    <div class="category-item">
                        <div class="category-name">${cat.name}</div>
                        <div class="category-bar">
                            <div class="category-bar-fill" style="width: ${cat.percentage}%"></div>
                        </div>
                        <div class="category-value">${cat.blocks}块 (${cat.percentage}%)</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="report-card">
                    <div class="report-header">
                        <span class="report-icon">📈</span>
                        <div>
                            <div class="report-title">本周工作周报</div>
                            <div class="report-date">第${data.weekNumber}周 (${data.startDate} ~ ${data.endDate})</div>
                        </div>
                    </div>
                    <div class="report-stats-grid">
                        <div class="report-stat">
                            <div class="report-stat-value">${s.totalHours}h</div>
                            <div class="report-stat-label">总工作时间</div>
                        </div>
                        <div class="report-stat">
                            <div class="report-stat-value">${s.completedBlocks}</div>
                            <div class="report-stat-label">完成块数</div>
                        </div>
                        <div class="report-stat">
                            <div class="report-stat-value">${s.completionRate}%</div>
                            <div class="report-stat-label">完成率</div>
                        </div>
                        <div class="report-stat">
                            <div class="report-stat-value">${s.totalBlocks}</div>
                            <div class="report-stat-label">总块数</div>
                        </div>
                    </div>
                </div>

                <div class="report-card">
                    <div class="report-section-title">📅 每日进度</div>
                    <div class="daily-progress">
                        ${dailyHtml}
                    </div>
                </div>

                ${categoryHtml ? `
                <div class="report-card">
                    <div class="report-section-title">📂 任务分类</div>
                    ${categoryHtml}
                </div>
                ` : ''}
            `;
        }

        // 回车添加任务
        document.getElementById('taskName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // 初始加载
        loadHomeData();
        setInterval(() => {
            if (document.querySelector('.nav-item.active').dataset.page === 'home') {
                loadHomeData();
            }
        }, 5000);
    </script>
</body>
</html>
