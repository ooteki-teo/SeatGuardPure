<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - SeatGuard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5em;
        }

        .header a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .settings-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .settings-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-info {
            flex: 1;
        }

        .setting-label {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .setting-desc {
            font-size: 0.85em;
            color: #666;
        }

        .setting-control {
            margin-left: 20px;
        }

        input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: #667eea;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle.active::after {
            transform: translateX(24px);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .unit {
            color: #666;
            font-size: 0.9em;
            margin-left: 8px;
        }

        .save-message {
            text-align: center;
            padding: 10px;
            color: #4caf50;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ 设置</h1>
        <a href="/">← 返回首页</a>
    </div>

    <div class="container">
        <div class="settings-card">
            <div class="settings-title">提醒设置</div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">久坐提醒时长</div>
                    <div class="setting-desc">超过此时间未活动将发送提醒</div>
                </div>
                <div class="setting-control">
                    <input type="number" id="reminderDuration" min="10" max="120" />
                    <span class="unit">分钟</span>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">休息倒计时</div>
                    <div class="setting-desc">久坐超时后进入休息模式的倒计时</div>
                </div>
                <div class="setting-control">
                    <input type="number" id="restCountdown" min="30" max="600" />
                    <span class="unit">秒</span>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">截图功能</div>
                    <div class="setting-desc">工作开始/结束时自动截图</div>
                </div>
                <div class="setting-control">
                    <div class="toggle" id="screenshotToggle" onclick="toggleScreenshot()"></div>
                </div>
            </div>
        </div>

        <div class="settings-card">
            <div class="settings-title">关于</div>
            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">版本</div>
                    <div class="setting-desc">SeatGuard v1.0.0</div>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">数据存储</div>
                    <div class="setting-desc">~/.seat_guard_data.json</div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" style="width: 100%;" onclick="saveSettings()">保存设置</button>
        <div class="save-message" id="saveMessage">设置已保存</div>
    </div>

    <script>
        let config = {};

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                config = await res.json();
                document.getElementById('reminderDuration').value = config.reminder_duration;
                document.getElementById('restCountdown').value = config.rest_countdown;

                const toggle = document.getElementById('screenshotToggle');
                if (config.screenshot_enabled) {
                    toggle.classList.add('active');
                } else {
                    toggle.classList.remove('active');
                }
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        function toggleScreenshot() {
            const toggle = document.getElementById('screenshotToggle');
            toggle.classList.toggle('active');
        }

        async function saveSettings() {
            const reminderDuration = parseInt(document.getElementById('reminderDuration').value);
            const restCountdown = parseInt(document.getElementById('restCountdown').value);
            const screenshotEnabled = document.getElementById('screenshotToggle').classList.contains('active');

            try {
                await fetch('/api/config', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        reminder_duration: reminderDuration,
                        rest_countdown: restCountdown,
                        screenshot_enabled: screenshotEnabled
                    })
                });

                const msg = document.getElementById('saveMessage');
                msg.style.display = 'block';
                setTimeout(() => {
                    msg.style.display = 'none';
                }, 2000);
            } catch (e) {
                alert('保存失败');
            }
        }

        loadConfig();
    </script>
</body>
</html>
